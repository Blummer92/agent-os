name: RC6 Technical Pilot Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  focused-tests:
    name: Run RC6 focused tests only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install focused dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install -e "./08_Tooling/reusable-capability-registry[test]"
      - name: Run focused tests
        run: python -m pytest tests/rc6_technical_pilot -q
