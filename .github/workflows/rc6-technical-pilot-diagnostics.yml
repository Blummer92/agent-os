name: RC6 Technical Pilot Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  focused-tests:
    name: Run RC6 focused tests only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install focused dependencies
        run: |
          python -m pip install -q -r requirements-dev.txt
          python -m pip install -q -e "./08_Tooling/reusable-capability-registry[test]"
      - name: Run focused tests
        run: python -m pytest tests/rc6_technical_pilot -q

  structural-validation:
    name: Run repository structure validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run structural validation
        run: bash 07_Agent_Tests/validate-repo-structure.sh

  root-tests:
    name: Run root pytest suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install root dependencies
        run: |
          python -m pip install -q -r requirements-dev.txt
          python -m pip install -q -e "./08_Tooling/reusable-capability-registry[test]"
      - name: Capture root test output
        id: root_tests
        run: |
          set +e
          python -m pytest tests -q --maxfail=1 > rc6-root-test.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload root test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc6-root-test-diagnostic
          path: rc6-root-test.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce root test result
        if: always()
        run: exit "${{ steps.root_tests.outputs.exit_code || '2' }}"
