name: Agent OS Validation Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Run aggregate validation
    runs-on: ubuntu-latest
    steps:
      - name: Cloud Build validation migration notice
        run: |
          echo "Agent OS aggregate validation has migrated to Google Cloud Build."
          echo "Use the Cloud Build PR trigger with cloudbuild.yaml as the required validation gate."
          echo "This compatibility check avoids waiting for the retired self-hosted agent-os runner."
