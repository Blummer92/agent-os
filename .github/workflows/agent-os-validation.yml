name: Agent OS Validation Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * 1-5"

permissions:
  contents: read

jobs:
  validate:
    name: Run aggregate validation
    runs-on: [self-hosted, agent-os]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify local Python
        shell: powershell
        run: |
          python --version
          python -m pip --version

      - name: Install validation dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r 08_Tooling/workflow-scheduler/requirements.txt
          python -m pip install -e "./08_Tooling/instructional-materials-coach[test]"
          python -m pip install -e "./08_Tooling/notion-navigation-client[test]"

      - name: Run Agent OS aggregate validation
        shell: powershell
        env:
          PYTHON_BIN: python
        run: |
          $bashCandidates = @(
            "$env:LOCALAPPDATA\Programs\Git\bin\bash.exe",
            "C:\Program Files\Git\bin\bash.exe",
            "C:\Program Files (x86)\Git\bin\bash.exe"
          )
          $bash = $bashCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $bash) {
            throw "Git Bash was not found in the expected Windows locations."
          }
          & $bash ./scripts/validate-all.sh
