name: Agent OS Validation Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * 1-5"

permissions:
  contents: read

jobs:
  validate:
    name: Run aggregate validation
    runs-on: [self-hosted, agent-os]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r 08_Tooling/workflow-scheduler/requirements.txt
          python -m pip install -e "./08_Tooling/instructional-materials-coach[test]"
          python -m pip install -e "./08_Tooling/notion-navigation-client[test]"

      - name: Run Agent OS aggregate validation
        run: ./scripts/validate-all.sh
