name: Navigation Registry Offline Tests

on:
  pull_request:
  push:

jobs:
  offline-notion-connector-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install offline test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run offline Notion connector contract tests
        run: pytest tests/navigation_registry/test_notion_read_only_connector.py
