# MD2A metadata validation fixture corpus
#
# These cases are fixture evidence only. They do not implement validation,
# enforcement, migration, issue mutation, or label mutation.
#
# Each case captures one MD0/MD1 metadata finding and the expected future
# report-only outcome for MD2B.

cases:
  - id: issue-tier-canonical-tier-0
    field: issue_tier
    input_evidence: tier:0-small-maintenance
    classification: canonical
    expected_outcome: pass
    reason: Exact MD0 v1 issue-tier value.

  - id: issue-tier-canonical-tier-1
    field: issue_tier
    input_evidence: tier:1-standard-implementation
    classification: canonical
    expected_outcome: pass
    reason: Exact MD0 v1 issue-tier value.

  - id: issue-tier-canonical-tier-2
    field: issue_tier
    input_evidence: tier:2-governed-cross-system
    classification: canonical
    expected_outcome: pass
    reason: Exact MD0 v1 issue-tier value.

  - id: issue-tier-candidate-alias-high-risk
    field: issue_tier
    input_evidence: tier:2-high-risk-or-governed-change
    classification: candidate-alias
    expected_outcome: manual-review
    reason: Candidate alias found by MD1; not approved as canonical.

  - id: issue-tier-ambiguous-generic-tier-2
    field: issue_tier
    input_evidence: Tier 2
    classification: ambiguous
    expected_outcome: manual-review
    reason: Generic tier language may describe execution risk, not issue tier.

  - id: issue-tier-execution-risk-tier-3
    field: issue_tier
    input_evidence: 'Tier 3: production modifier'
    classification: legacy-evidence-only
    expected_outcome: manual-review
    reason: Tier 3 has no MD0 v1 issue-tier equivalent.

  - id: readiness-candidate-ready
    field: readiness_candidate
    input_evidence: status:ready
    classification: canonical
    expected_outcome: pass
    reason: Exact MD0 readiness-candidate value.

  - id: readiness-candidate-blocked
