  - id: readiness-body-label-conflict
    field: readiness_candidate
    input_evidence: body=status:needs-decision; label=status:ready
    classification: ambiguous
    expected_outcome: manual-review
    reason: Conflicting governed sources cannot be silently resolved.

  - id: lifecycle-legacy-ready-for-planning
    field: lifecycle_status
